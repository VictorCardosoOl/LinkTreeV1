<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Victor Cardoso — Creative Developer &amp; Tech Enthusiast. Confira meus projetos e entre em contato."
    />
    <meta name="author" content="Victor Cardoso" />
    <meta name="theme-color" content="#eaeaeb" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://victorcardoso.com/" />
    <meta property="og:title" content="Victor Cardoso | Editorial Portfolio" />
    <meta
      property="og:description"
      content="Explore meu ecossistema digital. Projetos, contatos e redes sociais em uma experiência minimalista."
    />
    <meta property="og:image" content="./assets/og-image.jpg" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <title>Victor Cardoso | Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-page="home">
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    <!-- Container principal -->
    <main id="main-content" class="app-container">
      <!-- Topo da tela: Foto em P&B -->
      <div class="hero-cover">
        <img
          src="./assets/avatar.webp"
          alt="Retrato de Victor Cardoso"
          loading="eager"
          width="420"
          height="480"
        />
      </div>

      <!-- Card de Vidro Sobreposto -->
      <div class="profile-card">
        <div class="card-header anim-el">
          <h1 class="profile-name">Victor Cardoso</h1>
        </div>

        <!-- Links Minimalistas -->
        <nav class="links-section anim-el" aria-label="Links Sociais">
          <a
            href="https://victor-cardoso-dev.vercel.app"
            target="_blank"
            rel="noopener noreferrer"
            class="link-item"
          >
            <ion-icon name="globe-outline"></ion-icon>
            Portfólio Premium
          </a>
          <a
            href="https://github.com/VictorCardosoOl"
            target="_blank"
            rel="noopener noreferrer"
            class="link-item"
          >
            <ion-icon name="logo-github"></ion-icon>
            Repositório Git
          </a>
          <a
            href="https://www.linkedin.com/in/victor-card-cunha/"
            target="_blank"
            rel="noopener noreferrer"
            class="link-item"
          >
            <ion-icon name="logo-linkedin"></ion-icon>
            LinkedIn
          </a>
        </nav>

        <!-- Bento Grid: Ícones Sociais -->
        <div class="social-bento anim-el">
          <a href="https://instagram.com/abaxu_artes" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="bento-item">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
          <a href="mailto:victorcardosovc1@gmail.com" aria-label="Email" class="bento-item">
            <ion-icon name="mail-outline"></ion-icon>
          </a>
          <a href="https://wa.me/5511977440146" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp" class="bento-item">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </a>
        </div>

        <!-- Divisor: Galeria de Obras -->
        <div class="posts-divider anim-el">
          <div class="title-block">
            <h2>Obras &amp; Arte</h2>
            <p>Portfólio visual — fotografia e design</p>
          </div>
        </div>

        <!-- Grid de Imagens -->
        <section class="gallery-grid anim-el" aria-label="Galeria de obras">
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="heart"></ion-icon></div>
            <img src="./assets/gallery-1.jpg" alt="Obra fotográfica 1" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="star-outline"></ion-icon></div>
            <img src="./assets/gallery-2.jpg" alt="Obra fotográfica 2" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="heart-outline"></ion-icon></div>
            <img src="./assets/gallery-3.jpg" alt="Obra fotográfica 3" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="aperture-outline"></ion-icon></div>
            <img src="./assets/gallery-4.jpg" alt="Obra fotográfica 4" loading="lazy" />
          </div>
        </section>

        <footer class="anim-el">
          <a href="https://victor-cardoso-dev.vercel.app" rel="noopener noreferrer">
            &copy; 2026 Victor Cardoso
          </a>
        </footer>
      </div>
    </main>

    <!-- Lightbox Nativo HTML5 -->
    <dialog id="lightbox" aria-label="Visualizador de Imagem Expandida" aria-modal="true">
      <div class="lightbox-wrapper">
        <button id="close-lightbox" aria-label="Fechar visualizador">
          <ion-icon name="close-outline"></ion-icon>
        </button>
        <img id="lightbox-img" src="" alt="Obra expandida" />
      </div>
    </dialog>

    <!-- IonIcons CDN (Resolve problema de SVGs não injetados no build do Vite) -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
