<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Victor Cardoso — Fotografia e Artes. Explore meu portfólio visual.">
  <meta name="author" content="Victor Cardoso">
  <meta name="theme-color" content="#ffffff">

  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <title>Victor Cardoso | Fotografia &amp; Artes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="gallery.css">
</head>

<body data-page="gallery">
  <!-- Container principal, com a classe header-light para o ícone de menu ficar escuro -->
  <main class="app-container header-light">

    <!-- Ícone Hambúrguer (Header) -> Clicar levaria de volta pra Home neste mock -->
    <a href="index.html" class="menu-btn" aria-label="Voltar para a página principal">
      <ion-icon name="menu-outline"></ion-icon>
    </a>

    <!-- Card Principal Minimalista (sem a imagem preta no topo) -->
    <div class="profile-card gallery-header">
      <h1 class="profile-name">Victor Cardoso</h1>
      
      <a href="index.html" class="btn-outline anim-el">
        Voltar à Home
      </a>

      <p class="profile-bio anim-el">
        Creative Developer &amp; Tech Enthusiast.<br>
        Uma coleção visual de projetos e experimentações artísticas.
      </p>

      <!-- Stats Line -->
      <div class="stats-row anim-el">
        <div class="stat-item">
          <span class="stat-value">24</span>
          <span class="stat-label">Fotos</span>
        </div>
        <div class="stat-item">
          <span class="stat-label"></span>
          <span class="stat-label"></span>
        </div>
        <div class="stat-item">
          <span class="stat-value">05</span>
          <span class="stat-label">Artes</span>
        </div>
      </div>

      <!-- Divider: POSTS -->
      <div class="posts-divider anim-el">
        <span>Posts</span>
      </div>

      <!-- Grid de Imagens -->
      <section class="gallery-grid anim-el">
        <div class="gallery-item">
          <img src="./assets/b (4).jpg" alt="Obra 1" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="./assets/b (4).jpg" alt="Obra 2" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="./assets/b (4).jpg" alt="Obra 3" loading="lazy">
        </div>
        <div class="gallery-item">
          <img src="./assets/b (4).jpg" alt="Obra 4" loading="lazy">
        </div>
      </section>

      <footer>
        <p>&copy; 2024 Victor Cardoso &bull; SP</p>
      </footer>
    </div>
  </main>

  <script type="module" src="./script.js"></script>
</body>
</html>
