<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Galeria | Victor Cardoso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Gallery Specific Styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            width: 100%;
            margin-top: 2rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
        }

        .back-btn {
            align-self: flex-start;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <main>
        <a href="index.html" class="back-btn">
            <ion-icon name="arrow-back"></ion-icon> Voltar
        </a>

        <header id="profile" style="margin-top: 2rem;">
            <h1 class="nome">Álbuns & Artes</h1>
            <p style="color: rgba(255,255,255,0.6); text-align: center;">Uma coleção de momentos visuais.</p>
        </header>

        <div class="gallery-grid">
            <!-- Placeholders -->
            <div class="gallery-item"><ion-icon name="image-outline" size="large"></ion-icon></div>
            <div class="gallery-item"><ion-icon name="image-outline" size="large"></ion-icon></div>
            <div class="gallery-item"><ion-icon name="image-outline" size="large"></ion-icon></div>
            <div class="gallery-item"><ion-icon name="image-outline" size="large"></ion-icon></div>
        </div>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="./script.js"></script>
</body>

</html>
