<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galeria de álbuns e artes visuais de Victor Cardoso — uma coleção de momentos e criações.">
  <meta name="author" content="Victor Cardoso">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="gallery.css">
</head>

<body>
  <main>
    <a href="index.html" class="back-btn" aria-label="Voltar para a página principal">
      <ion-icon name="arrow-back" aria-hidden="true"></ion-icon>

    <section aria-label="Grade de imagens da galeria">

        </div>
      </div>

  </main>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script type="module" src="./script.js"></script>

  <noscript>
    <style>
      body::before { opacity: 1; }
      main { opacity: 1; transform: none; animation: none; }
    </style>
    <div style="text-align:center;padding:1rem;color:#fff;background:#990000;">
      Para a experiência completa, por favor ative o JavaScript.
    </div>
