<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="Victor Cardoso — Fotografia e Artes. Explore meu portfólio visual."
    />
    <meta name="author" content="Victor Cardoso" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <title>Victor Cardoso | Fotografia &amp; Artes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="gallery.css" />
  </head>

  <body data-page="gallery">
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    <!-- Container principal -->
    <main id="main-content" class="app-container">
      <!-- Ícone Hambúrguer (Header) -> Back button here -->
      <a href="index.html" class="menu-btn" aria-label="Voltar para a página principal">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </a>

      <!-- Card Secundário Transparente -->
      <div class="profile-card gallery-header">
        
        <!-- Divider: ADD INSPO -->
        <div class="posts-divider anim-el">
          <div class="title-block">
            <h2>Add inspo</h2>
            <p>Your references for stylist</p>
          </div>
          <div class="actions">
            <ion-icon name="search-outline" style="color:#fff; font-size:1.2rem; margin-right: 0.5rem;"></ion-icon>
            <ion-icon name="heart" style="color:#fff; font-size:1.2rem;"></ion-icon>
          </div>
        </div>

        <!-- Filters Row -->
        <div class="tags-row anim-el">
          <button class="tag-pill">Autumn <ion-icon name="close-outline"></ion-icon></button>
          <button class="tag-pill">Almond shape <ion-icon name="close-outline"></ion-icon></button>
          <button class="tag-pill">Nude <ion-icon name="close-outline"></ion-icon></button>
        </div>

        <!-- Grid de Imagens -->
        <section class="gallery-grid anim-el">
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="heart"></ion-icon></div>
            <img src="./assets/b (4).jpg" alt="Obra 1" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="add-outline"></ion-icon></div>
            <img src="./assets/b (4).jpg" alt="Obra 2" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="heart-outline"></ion-icon></div>
            <img src="./assets/b (4).jpg" alt="Obra 3" loading="lazy" />
          </div>
          <div class="gallery-item">
            <div class="item-icon"><ion-icon name="add-outline"></ion-icon></div>
            <img src="./assets/b (4).jpg" alt="Obra 4" loading="lazy" />
          </div>
        </section>

        <footer class="anim-el">
          <p>&copy; 2026 Victor Cardoso</p>
        </footer>
      </div>
    </main>

    <!-- Lightbox Nativo HTML5 -->
    <dialog id="lightbox" aria-label="Visualizador de Imagem Expandida">
      <div class="lightbox-wrapper">
        <button id="close-lightbox" aria-label="Fechar visualizador">
          <ion-icon name="close-outline"></ion-icon>
        </button>
        <img id="lightbox-img" src="" alt="Obra expandida" />
      </div>
    </dialog>

    <!-- IonIcons CDN -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
